
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بساتين - الفخامة الطازجة</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6b7a35; }
        body { background: linear-gradient(135deg, #f9fbf7 0%, #eef3e8 100%); font-family: 'Cairo', sans-serif; min-height: 100vh; padding-bottom: 50px; }
        .container { max-width: 600px; margin: auto; padding: 20px; text-align: center; }
        
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .farmer-anim { font-size: 70px; animation: bounce 3s infinite; }
        .title-fancy { font-family: 'Amiri', serif; font-size: 50px; color: var(--primary); }
        .slogan { font-size: 16px; color: #777; margin-bottom: 20px; }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .product-box { background: white; padding: 15px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); cursor: pointer; font-weight: 700; transition: 0.3s; }
        .product-box img { width: 100%; height: 120px; object-fit: contain; display: block; margin: 0 auto 10px; }
        .product-box:active { transform: scale(0.95); }
        
        .counter { display: flex; justify-content: center; align-items: center; gap: 20px; margin: 20px 0; }
        .btn-count { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 10px; font-size: 20px; cursor: pointer; }
        .num-display { font-size: 24px; font-weight: bold; width: 50px; }
        
        .option { padding: 12px; border-radius: 15px; border: 2px solid transparent; background: #fff; margin: 5px; cursor: pointer; display: inline-block; transition: 0.3s; }
        .option.selected { border-color: var(--primary); background: #f0f5e8; transform: scale(1.05); }

        .btn-pay { background: var(--primary); color: white; width: 100%; padding: 18px; border-radius: 50px; border: none; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div id="grid-view">
        <div class="farmer-anim">👨‍🌾</div>
        <div class="title-fancy">بساتين</div>
        <div class="slogan">من أرضنا الطيبة.. إلى مائدتكم مباشرة 🌿</div>
        <div class="grid">
            <script>
                const prods = [
                    {n: "طماطم 🍅", i: "https://b.top4top.io/p_3808afug70.jpeg"},
                    {n: "جزر 🥕", i: "https://c.top4top.io/p_3808n0r6h1.jpeg"},
                    {n: "بصل 🧅", i: "https://d.top4top.io/p_3808rtuwr4.jpeg"},
                    {n: "كوسة 🥒", i: "https://e.top4top.io/p_3808bn76y5.jpeg"},
                    {n: "خس 🥬", i: "https://f.top4top.io/p_38085nrsi8.jpeg"}
                ];
                prods.forEach(p => document.write(`<div class="product-box" onclick="goDetails('${p.n}')"><img src="${p.i}">${p.n}</div>`));
            </script>
        </div>
    </div>

    <div id="details-view" style="display:none;">
        <h2 id="prod-title" style="color: var(--primary);"></h2>
        <p>العدد:</p>
        <div class="counter">
            <button class="btn-count" onclick="changeCount(-1)">-</button>
            <div class="num-display" id="count">1</div>
            <button class="btn-count" onclick="changeCount(1)">+</button>
        </div>
        <p>اختر الحجم:</p>
        <div id="size-options">
            <span class="option" onclick="select(this, 'size')">صغير 🤏</span>
            <span class="option" onclick="select(this, 'size')">وسط ⚖️</span>
            <span class="option" onclick="select(this, 'size')">كبير 📦</span>
        </div>
        <p style="margin-top:20px;">طريقة الدفع:</p>
        <div id="pay-options">
            <span class="option" onclick="select(this, 'pay')">الدفع عند الاستلام 💵</span>
            <span class="option" onclick="select(this, 'pay')">مدى ⚡️</span>
            <span class="option" onclick="select(this, 'pay')">لينك 🔗</span>
        </div>
        <button class="btn-pay" onclick="sendWhatsApp()">إتمام الدفع عبر واتساب 📲</button>
        <button onclick="goBack()" style="background:none; border:none; margin-top:20px; color:#aaa; text-decoration:underline;">العودة</button>
    </div>
</div>

<script>
    let currentProd = "", count = 1;
    function changeCount(val) { count = Math.max(1, Math.min(200, count + val)); document.getElementById('count').innerText = count; }
    function select(el, group) {
        el.parentElement.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
        el.classList.add('selected');
    }
    function goDetails(name) {
        currentProd = name;
        document.getElementById('grid-view').style.display = 'none';
        document.getElementById('prod-title').innerText = name;
        document.getElementById('details-view').style.display = 'block';
    }
    function goBack() { document.getElementById('details-view').style.display = 'none'; document.getElementById('grid-view').style.display = 'block'; }
    function sendWhatsApp() {
        let size = document.querySelector('#size-options .selected')?.innerText || "لم يتم اختيار الحجم";
        let pay = document.querySelector('#pay-options .selected')?.innerText || "لم يتم اختيار طريقة الدفع";
        let msg = `✨ طلب جديد من بساتين ✨%0A%0A📦 المنتج: ${currentProd}%0A🔢 العدد: ${count}%0A📏 الحجم: ${size}%0A💳 طريقة الدفع: ${pay}%0A%0Aبانتظار تأكيد طلبكم.. 🌿`;
        window.location.href = "https://wa.me/96598523539?text=" + msg;
    }
</script>

</body>
</html>
